pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting (optional, good practice for production RAG APIs)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 7860;
        server_name localhost;

        # Route FastAPI chat API
        location /chat {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://127.0.0.1:8001/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route FastAPI health endpoint
        location /health {
            proxy_pass http://127.0.0.1:8001/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Streamlit WebSocket connections (crucial for Streamlit UI to work).
        # We use a regex match to cover both modern Streamlit (/_stcore/stream) and older versions (/stream).
        # Explanation of WebSocket Headers (Interview tip):
        # 1. 'Connection: Upgrade' and 'Upgrade: websocket' tell the proxy that the client wants to switch
        #    protocols from standard HTTP to a persistent, bidirectional WebSocket connection.
        # 2. 'proxy_http_version 1.1' is required because HTTP/1.1 is the minimum version supporting protocol upgrades.
        # 3. By default, Nginx strips hop-by-hop headers like 'Upgrade' and 'Connection' when proxying. We must
        #    explicitly set them so Nginx passes the handshake request downstream to the Streamlit server.
        # 4. 'proxy_read_timeout 86400s' (24 hours) prevents Nginx from closing the WebSocket due to inactivity.
        location ~ ^/(?:_stcore/)?stream {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Route all other traffic to Streamlit UI
        location / {
            proxy_pass http://127.0.0.1:8501/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
